# group_vars/all.yml
# Variables applied to every host found by the dynamic inventory.

# Username used to SSH into the EC2 instances (default for Ubuntu AMIs)
ansible_user: ubuntu

# Path to the private key matching the key pair used to launch the instances
ansible_ssh_private_key_file: ~/.ssh/id_rsa

# Skip strict host key checking (useful since EC2 IPs change often)
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
