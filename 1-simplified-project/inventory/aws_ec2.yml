# inventory/aws_ec2.yml
# This file tells Ansible to ask AWS for a live list of EC2 instances,
# instead of using a static file with hardcoded IP addresses.

# Use the official AWS EC2 dynamic inventory plugin
plugin: amazon.aws.aws_ec2

# Which AWS region(s) to search for instances
regions:
  - us-east-1

# Only include instances that are currently running
filters:
  instance-state-name: running

# Automatically group instances by tag and instance type
keyed_groups:
  - key: tags
    prefix: tag
  - key: instance_type
    prefix: type

# Use the public IP as the address Ansible connects to.
# Falls back to the private IP if there is no public IP.
compose:
  ansible_host: public_ip_address | default(private_ip_address)
