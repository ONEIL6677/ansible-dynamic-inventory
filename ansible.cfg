# =============================================================================
# ansible.cfg
# -----------------------------------------------------------------------------
# This file configures how Ansible behaves when you run commands from inside
# this project folder. Ansible automatically looks for "ansible.cfg" in the
# current directory BEFORE falling back to its global/default settings.
# =============================================================================

[defaults]
# Tell Ansible where to find our inventory (the list of servers to manage).
# Instead of a static file with hardcoded IPs, this points to our DYNAMIC
# inventory configuration, which asks AWS for the list of servers live.
inventory = inventory/aws_ec2.yml

# Disable SSH host key checking so Ansible doesn't pause and ask
# "Are you sure you want to continue connecting (yes/no)?" the first
# time it connects to a new EC2 instance.
# NOTE: This is convenient for labs/testing. For production, consider
# managing known_hosts properly instead of disabling this check.
host_key_checking = False

# Make playbook output easier to read — shows results in a clean YAML format
# instead of the default dense JSON-like output.
stdout_callback = yaml

[inventory]
# Allow Ansible to use these inventory plugins. "aws_ec2" is REQUIRED for
# our dynamic inventory to work. The others ("auto", "yaml", "ini", "script")
# are included so Ansible can still read static inventories or scripts if
# you add them later.
enable_plugins = aws_ec2, auto, yaml, ini, script
